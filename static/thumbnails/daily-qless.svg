<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#00001a"/>

  <!--
    3×3 grid: cell=26, gap=6, pad=5 on each side
    Col/row starting positions: 5, 37, 69  |  centers: 18, 50, 82
    Empty cells: #113 (bg-2, the droppable-space color in Q-less)
    Center Q tile: #666 (filled tile color)
  -->

  <!-- Row 0: empty cells -->
  <rect x="5"  y="5"  width="26" height="26" rx="2" fill="#113"/>
  <rect x="37" y="5"  width="26" height="26" rx="2" fill="#113"/>
  <rect x="69" y="5"  width="26" height="26" rx="2" fill="#113"/>
  <!-- Row 1: empty, Q, empty -->
  <rect x="5"  y="37" width="26" height="26" rx="2" fill="#113"/>
  <rect x="37" y="37" width="26" height="26" rx="2" fill="#666"/>
  <rect x="69" y="37" width="26" height="26" rx="2" fill="#113"/>
  <!-- Row 2: empty cells -->
  <rect x="5"  y="69" width="26" height="26" rx="2" fill="#113"/>
  <rect x="37" y="69" width="26" height="26" rx="2" fill="#113"/>
  <rect x="69" y="69" width="26" height="26" rx="2" fill="#113"/>

  <!-- Q: highlighted yellow (legal word color) -->
  <text x="50" y="52" text-anchor="middle" dominant-baseline="central"
        font-size="21" font-weight="700" font-family="Helvetica, sans-serif" fill="#ee1">Q</text>

  <!--
    Prohibition sign centered at (50,50).
    Radius = 32 passes through adjacent-tile centers (18,50), (82,50), (50,18), (50,82).
    Diagonal from (50 − 32/√2, 50 − 32/√2) ≈ (27.4, 27.4) to (72.6, 72.6).
  -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#f44" stroke-width="2"/>
  <line x1="27.4" y1="27.4" x2="72.6" y2="72.6"
        stroke="#f44" stroke-width="2" stroke-linecap="round"/>
</svg>
