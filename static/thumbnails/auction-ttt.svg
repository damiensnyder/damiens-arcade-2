<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Grid lines only — cells are transparent so the container bg shows through -->
  <rect x="0"  y="32" width="100" height="2" fill="#ccc"/>
  <rect x="0"  y="66" width="100" height="2" fill="#ccc"/>
  <rect x="32" y="0"  width="2" height="100" fill="#ccc"/>
  <rect x="66" y="0"  width="2" height="100" fill="#ccc"/>

  <!-- X in top-left cell (0,0)–(32,32): 20%/80% of 32 = 6.4/25.6 -->
  <line x1="6.4" y1="6.4" x2="25.6" y2="25.6" stroke="#f6a" stroke-width="2" stroke-linecap="round"/>
  <line x1="25.6" y1="6.4" x2="6.4" y2="25.6" stroke="#f6a" stroke-width="2" stroke-linecap="round"/>

  <!-- $ in center cell (34,34)–(66,66), center (50,50); y nudged down to correct baseline -->
  <text x="50" y="52" text-anchor="middle" dominant-baseline="central"
        font-size="22" font-weight="200" font-family="Helvetica, sans-serif" fill="#ccc">$</text>

  <!-- O in bottom-right cell (68,68)–(100,100), center (84,84), r = 30% of 32 = 9.6 -->
  <circle cx="84" cy="84" r="9.6" fill="none" stroke="#6df" stroke-width="2"/>
</svg>
